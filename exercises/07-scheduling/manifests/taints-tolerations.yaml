# Taints repel pods. Tolerations allow a pod to schedule onto a tainted node.
#
# Apply a taint first:
#   kubectl taint nodes <node-name> dedicated=gpu:NoSchedule
#
# Remove it when done:
#   kubectl taint nodes <node-name> dedicated=gpu:NoSchedule-
apiVersion: v1
kind: Pod
metadata:
  name: tolerating-pod
  labels:
    exercise: "07"
spec:
  tolerations:
    # This toleration matches the taint above and allows scheduling onto the node.
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
    # Tolerate the built-in node-not-ready taint for 300 seconds before eviction.
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 300
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
