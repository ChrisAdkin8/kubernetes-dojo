apiVersion: v1
kind: Pod
metadata:
  name: node-selector-pod
  labels:
    exercise: "07"
spec:
  # nodeSelector: schedule only on nodes with matching labels.
  # Label the node first: kubectl label node <node-name> workload=compute
  nodeSelector:
    workload: compute
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
