# This pod is intentionally broken — it allocates more memory than its limit.
# Use it to practice diagnosing OOMKilled.
#
# Diagnosis commands:
#   kubectl get pod oom-pod -w          # watch it get OOMKilled
#   kubectl describe pod oom-pod        # look for OOMKilled in the Events section
#   kubectl get events --sort-by='.lastTimestamp'
apiVersion: v1
kind: Pod
metadata:
  name: oom-pod
  labels:
    exercise: "10"
    scenario: oomkilled
spec:
  containers:
    - name: memory-hog
      image: polinux/stress:latest
      command: ["stress"]
      # Allocate 200Mi — twice the memory limit — which triggers OOMKilled.
      args: ["--vm", "1", "--vm-bytes", "200M", "--timeout", "60s"]
      resources:
        requests:
          cpu: "50m"
          memory: "50Mi"
        limits:
          cpu: "100m"
          memory: "100Mi"
