apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  labels:
    exercise: "04"
type: Opaque
# Values are base64-encoded. To encode: echo -n 'value' | base64
# To decode: echo 'dmFsdWU=' | base64 -d
# NOTE: base64 is NOT encryption. Use a secrets manager (AWS Secrets Manager
# or Sealed Secrets) for real credentials.
stringData:
  # stringData accepts plain text — Kubernetes encodes it automatically.
  DB_HOST: "postgres.internal"
  DB_PORT: "5432"
  DB_USER: "appuser"
  DB_PASSWORD: "change-me-before-use"
