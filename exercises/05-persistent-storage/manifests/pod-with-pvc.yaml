apiVersion: v1
kind: Pod
metadata:
  name: pod-with-storage
  labels:
    exercise: "05"
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Writing to persistent volume..."
          date > /data/timestamp.txt
          echo "Node: $NODE_NAME" >> /data/timestamp.txt
          while true; do
            echo "$(date): still running" >> /data/log.txt
            sleep 10
          done
      env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      volumeMounts:
        - name: data-volume
          mountPath: /data
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "64Mi"
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: app-data
