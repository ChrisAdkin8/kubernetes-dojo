apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  labels:
    exercise: "01"
spec:
  # Init container runs to completion before the main containers start.
  # Use case: wait for a dependency, seed a shared volume.
  initContainers:
    - name: init-message
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - echo 'Hello from init container' > /shared/message.txt
      volumeMounts:
        - name: shared-data
          mountPath: /shared

  containers:
    # Main application container
    - name: app
      image: nginx:1.27-alpine
      volumeMounts:
        - name: shared-data
          mountPath: /usr/share/nginx/html
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

    # Sidecar: tails the nginx access log and writes to stdout
    - name: log-sidecar
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          mkdir -p /var/log
          touch /var/log/access.log
          tail -f /var/log/access.log
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "20m"
          memory: "32Mi"

  volumes:
    - name: shared-data
      emptyDir: {}
