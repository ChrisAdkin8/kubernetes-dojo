---
apiVersion: v1
kind: Namespace
metadata:
  name: team-alpha
  labels:
    exercise: "08"

---
# ResourceQuota: caps the total resources a namespace can consume.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-alpha-quota
  namespace: team-alpha
  labels:
    exercise: "08"
spec:
  hard:
    # Compute
    requests.cpu: "2"
    limits.cpu: "4"
    requests.memory: "2Gi"
    limits.memory: "4Gi"
    # Object count
    pods: "20"
    services: "5"
    persistentvolumeclaims: "10"
    secrets: "20"
    configmaps: "20"

---
# LimitRange: sets default requests/limits for containers that don't specify them.
# Also enforces min/max bounds per container.
apiVersion: v1
kind: LimitRange
metadata:
  name: team-alpha-limits
  namespace: team-alpha
  labels:
    exercise: "08"
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "1"
        memory: "1Gi"
      min:
        cpu: "10m"
        memory: "16Mi"
    - type: PersistentVolumeClaim
      max:
        storage: "50Gi"
      min:
        storage: "1Gi"
