apiVersion: v1
kind: Service
metadata:
  name: web-app-lb
  labels:
    exercise: "05"
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  # LoadBalancer: creates an AWS load balancer and exposes the service externally.
  type: LoadBalancer
  selector:
    app: web-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
