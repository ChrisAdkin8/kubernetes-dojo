apiVersion: v1
kind: Service
metadata:
  name: web-app-lb
  labels:
    exercise: "03"
  annotations:
    # Provision an internal (VPC-only) NLB instead of a public-facing one.
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  # LoadBalancer: creates an AWS load balancer and exposes the service externally.
  type: LoadBalancer
  selector:
    app: web-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
