apiVersion: v1
kind: Service
metadata:
  name: web-app-nodeport
  labels:
    exercise: "03"
spec:
  # NodePort: exposes the service on a static port on every node.
  # Access via <NodeIP>:<nodePort> — useful for quick testing.
  type: NodePort
  selector:
    app: web-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      # nodePort range: 30000–32767; omit to let Kubernetes assign one.
      nodePort: 30080
