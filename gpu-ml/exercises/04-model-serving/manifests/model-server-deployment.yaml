apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-server
  template:
    metadata:
      labels:
        app: model-server
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        workload-type: gpu
      containers:
        - name: server
          image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
          command:
            - python
            - -c
            - |
              import torch, time, json
              from http.server import HTTPServer, BaseHTTPRequestHandler

              device = torch.device("cuda" if torch.cuda.is_available() else "cpu")
              print(f"Loading model onto {device}...")
              # Simulate model load time
              time.sleep(10)
              model = torch.nn.Sequential(
                  torch.nn.Linear(5, 64),
                  torch.nn.ReLU(),
                  torch.nn.Linear(64, 1),
                  torch.nn.Sigmoid(),
              ).to(device)
              model.eval()
              print("Model ready.")

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/healthz":
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"ok")
                  def do_POST(self):
                      if self.path == "/predict":
                          length = int(self.headers["Content-Length"])
                          body = json.loads(self.rfile.read(length))
                          inp = torch.tensor([body["input"]], dtype=torch.float32, device=device)
                          t0 = time.perf_counter()
                          with torch.no_grad():
                              out = model(inp)
                          latency_ms = (time.perf_counter() - t0) * 1000
                          result = json.dumps({
                              "prediction": round(out.item(), 3),
                              "device": str(device),
                              "latency_ms": round(latency_ms, 2),
                          }).encode()
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(result)
                  def log_message(self, *args):
                      pass  # suppress access logs

              print("Serving on :8080")
              HTTPServer(("", 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "500m"
              memory: "1Gi"
            limits:
              nvidia.com/gpu: "1"
              cpu: "2"
              memory: "4Gi"
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30   # 30 × 10s = 5 minutes maximum model load window
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
