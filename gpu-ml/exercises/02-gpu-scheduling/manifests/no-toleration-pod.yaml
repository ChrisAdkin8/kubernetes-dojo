apiVersion: v1
kind: Pod
metadata:
  name: gpu-no-toleration
spec:
  restartPolicy: Never
  # No tolerations — deliberately omitted to demonstrate scheduling failure
  nodeSelector:
    workload-type: gpu
  containers:
    - name: workload
      image: nvidia/cuda:12.3.0-base-ubuntu22.04
      command: ["sleep", "60"]
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
