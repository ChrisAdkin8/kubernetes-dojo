apiVersion: v1
kind: Pod
metadata:
  name: dataset-reader
spec:
  restartPolicy: Never
  containers:
    - name: reader
      image: python:3.11-slim
      command:
        - python3
        - -c
        - |
          import os, time
          print("Listing /data contents:")
          for f in sorted(os.listdir('/data')):
              size = os.path.getsize(f'/data/{f}')
              print(f"  {f}  ({size} bytes)")
          with open('/data/dataset-info.txt') as f:
              print("\ndataset-info.txt:")
              print(f.read())
          print("\nConcurrent read successful — RWX mount confirmed.")
          # Stay running to demonstrate simultaneous mount
          while True:
              time.sleep(60)
      volumeMounts:
        - name: dataset
          mountPath: /data
  volumes:
    - name: dataset
      persistentVolumeClaim:
        claimName: shared-dataset
