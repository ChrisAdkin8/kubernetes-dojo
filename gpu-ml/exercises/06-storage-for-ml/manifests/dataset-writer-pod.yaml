apiVersion: v1
kind: Pod
metadata:
  name: dataset-writer
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: python:3.11-slim
      command:
        - python3
        - -c
        - |
          import os, json, time
          os.makedirs('/data', exist_ok=True)
          # Write a synthetic dataset manifest
          info = {
              'name': 'synthetic-classification',
              'samples': 10000,
              'features': 128,
              'classes': 10,
              'created_at': time.strftime('%Y-%m-%dT%H:%M:%SZ'),
          }
          with open('/data/dataset-info.txt', 'w') as f:
              json.dump(info, f, indent=2)
          # Write sample data files
          for i in range(5):
              with open(f'/data/shard-{i:03d}.bin', 'wb') as f:
                  f.write(os.urandom(1024 * 1024))  # 1 MB per shard
          print('Dataset written to /data/')
          print('Keeping pod alive for concurrent mount test...')
          # Stay running so the RWX mount can be tested simultaneously
          while True:
              time.sleep(60)
      volumeMounts:
        - name: dataset
          mountPath: /data
  volumes:
    - name: dataset
      persistentVolumeClaim:
        claimName: shared-dataset
